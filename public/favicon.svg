<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="uaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="#000000" rx="4"/>
  
  <!-- Hexagonal Border -->
  <polygon points="16,6 24,10 24,18 16,22 8,18 8,10" 
           fill="none" 
           stroke="#00ff00" 
           stroke-width="1" 
           filter="url(#neonGlow)"/>
  
  <!-- UA Block Letters - Simplified for small size -->
  <!-- U Letter -->
  <g transform="translate(10, 10)">
    <polygon points="0,0 2,0 2,8 0,8" fill="url(#uaGradient)" stroke="#00ff00" stroke-width="0.5"/>
    <polygon points="0,8 2,8 2,10 0,10" fill="url(#uaGradient)" stroke="#00ff00" stroke-width="0.5"/>
    <polygon points="4,0 6,0 6,8 4,8" fill="url(#uaGradient)" stroke="#00ff00" stroke-width="0.5"/>
  </g>
  
  <!-- A Letter -->
  <g transform="translate(18, 10)">
    <polygon points="0,8 2,0 4,0 2,8" fill="url(#uaGradient)" stroke="#00ff00" stroke-width="0.5"/>
    <polygon points="2,0 4,0 6,8 4,8" fill="url(#uaGradient)" stroke="#00ff00" stroke-width="0.5"/>
    <polygon points="1,5 5,5 5,6 1,6" fill="url(#uaGradient)" stroke="#00ff00" stroke-width="0.5"/>
  </g>
  
  <!-- Designs Text -->
  <text x="16" y="28" font-family="Arial, sans-serif" font-size="3" font-weight="300" font-style="italic" text-anchor="middle" fill="#00ff00" filter="url(#neonGlow)">designs</text>
</svg>
